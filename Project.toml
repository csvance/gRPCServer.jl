name = "gRPCServer"
uuid = "b7f0dee4-5e6a-42e7-93b0-9c098bad2317"
version = "0.1.0"
authors = ["Carroll Vance <cvance@medicalmetrics.com>"]

[deps]
HTTP = "cd3eb016-35fb-5094-929b-558a96fad6f3"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"
ProtoBuf = "3349acd9-ac6a-5e09-bcdb-63829b23a429"
Reseau = "802f3686-a58f-41ce-bb0c-3c43c75bba36"

[compat]
HTTP = "2"
PrecompileTools = "^1.2"
ProtoBuf = "~1.3"
Reseau = "1"
julia = "1.10"

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"
Sockets = "6462fe0b-24de-5631-8697-dd941f90decc"
gRPCClient = "aaca4a50-36af-4a1d-b878-4c443f2061ad"

# `HTTP` is pinned to the fork branch that adds configurable HTTP/2 flow-control
# window sizes; `gRPCClient` is a local sibling checkout driving the integration
# test. Remove these entries (or point them at registered versions) when running
# CI against the registry.
[sources]
HTTP = {url = "https://github.com/csvance/HTTP.jl.git", rev = "http2-window-size-args"}
gRPCClient = {path = "../gRPCClient.jl"}

[targets]
test = ["Test", "Sockets", "gRPCClient"]
