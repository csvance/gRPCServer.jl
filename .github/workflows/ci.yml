name: CI
on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1.12', 'nightly']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
      # The integration test drives the server with gRPCClient.jl, resolved via
      # the [sources] entry pointing at a sibling ../gRPCClient.jl checkout.
      - name: Checkout gRPCClient.jl as a sibling
        uses: actions/checkout@v5
        with:
          repository: JuliaIO/gRPCClient.jl
          path: gRPCClient.jl
      - name: Move package into place
        run: mv gRPCClient.jl ../gRPCClient.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
