name: CI
on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# Least privilege: the test job only needs to read the repository contents.
permissions:
  contents: read
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1.12', 'nightly']
        os: [ubuntu-latest]
    steps:
      # Third-party actions are pinned to a full-length commit SHA (the tag in
      # the trailing comment is for humans) so a moved or compromised tag cannot
      # silently change what runs in CI. checkout uses persist-credentials:false
      # so the GITHUB_TOKEN is not left in the on-disk git config for later steps.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      # The integration test drives the server with gRPCClient.jl, resolved via
      # the [sources] entry pointing at a sibling ../gRPCClient.jl checkout. This
      # runs that repository's current default-branch code in CI; pin `ref:` to a
      # tag or SHA if you need a reproducible, supply-chain-fixed client.
      - name: Checkout gRPCClient.jl as a sibling
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: JuliaIO/gRPCClient.jl
          path: gRPCClient.jl
          persist-credentials: false
      - name: Move package into place
        run: mv gRPCClient.jl ../gRPCClient.jl
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1
      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1
      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
